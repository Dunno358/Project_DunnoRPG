{% extends 'master.html' %}

{% block title %}Nowa postać{% endblock title %}

{% block content %}

{% include 'dunnorpg/messages.html' %}
<div class='container mt-0'>

    <div class="row">
        <div class="col c-gold">
            <a class='btn btn-dark btn-outline-danger w-100' href={% url 'home' %}><- Powrót na stronę główną</a>
        </div>
    </div>
</div>

<div class='container mb-5 d-none mt-2' id="iframe-container" style='height: 30rem;'>

    <div class="row">
        <div class="col c-gold ps-0 pe-0">
            <button class="'btn btn-dark btn-outline-danger w-100 border-1 p-1 rounded" onclick=hideIframe()> 
                <b>X Zamknik podgląd X</b>
            </button>
        </div>
    </div>

    <div class="row h-100">
        <div class="col c-gold ps-0 pe-0">
            <iframe src="" class="w-100 h-100 border border-warning" id="iframe"></iframe>
        </div>
    </div>
</div>

<div class="container ps-0 pe-0 mt-5">
    <div class='row ms-1 me-1'>
        <div class="col bg-gray border border-warning c-gold rounded text-center">

            <div class="row mt-3">
                <div class="col">
                    <input class="w-100 text-center rounded p-2" id="char-name" placeholder="Nazwa postaci">
                </div>
            </div>

            <div class="row mt-2">
                <div class="col">
                    <a class='c-gold' style="text-decoration: underline; margin-left: -6rem" onclick=showIframe('/dunnorpg/info/races')>[Sprawdź rasy]</a>
                    <span class="c-gold h4">Rasa:</span>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <select class="w-100 text-center border border-warning bg-dark text-white-50 rounded p-2" id="char-race">
                        {% for race in races %}
                            <option value="{{ race.name }}">{{ race.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row mt-2">
                <div class="col">
                    <a class='c-gold' style="text-decoration: underline; margin-left: -6rem" onclick=showIframe('/dunnorpg/info/classes')>[Sprawdź klasy]</a>
                    <span class="c-gold h4">Klasa:</span>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <input type="hidden" id="char-class" value="{% if classes %}{{ classes.0.name }}{% endif %}">
                    <select class="d-none d-md-block w-100 text-center border border-warning bg-dark text-white-50 rounded p-2" id="char-class-select" onchange="chooseClassFromSelect(this)">
                        {% for class in classes %}
                            <option value="{{ class.name }}">{{ class.name }}</option>
                        {% endfor %}
                    </select>
                    <button
                        type="button"
                        id="char-class-dropdown-toggle"
                        class="d-md-none btn btn-dark border border-warning text-white-50 w-100"
                        onclick="toggleClassDropdown()"
                    >
                        {% if classes %}{{ classes.0.name }}{% endif %}
                    </button>
                    <div id="char-class-dropdown-menu" class="d-none d-md-none w-100 border border-warning bg-dark rounded overflow-auto mt-1" style="max-height: 45vh;">
                        {% for class in classes %}
                            <button
                                type="button"
                                name="class-choice"
                                class="btn btn-dark {% if forloop.first %}border-primary{% else %}border-warning{% endif %} text-white-50 w-100 m-0 rounded-0"
                                data-class-name="{{ class.name }}"
                                onclick="chooseClass(this)"
                            >
                                {{ class.name }}
                            </button>
                        {% endfor %}
                    </div>
                </div>
            </div>

            <div class="row mt-2">
                <div class="col">
                    <span class="c-gold h4">Type:</span>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <input class="w-100 text-center border border-warning bg-dark text-white-50 rounded p-2" id="char-type" type="text" value="Player"
                    {% if not user.is_superuser %}disabled{% endif %}/>
                </div>
            </div>

            <div class="row mt-2">
                <div class="col">
                    <span class="c-gold h4">Owner:</span>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <input class="w-100 text-center border border-warning bg-dark text-white-50 rounded p-2" id="char-owner" type="text" value="{{ user }}"
                    {% if not user.is_superuser %}disabled{% endif %}/>
                </div>
            </div>

            <div class="row mt-2">
                <div class="col">
                    <span class="c-gold h4">EXP:</span>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <input class="w-100 text-center border border-warning bg-dark text-white-50 rounded p-2" id="char-exp" type="number" value="0"
                    {% if not user.is_superuser %}disabled{% endif %}/>
                </div>
            </div>

            <button class="btn btn-dark border border-warning btn-lg w-75 me-4 m-1 mt-3" onclick=createChar()>Dalej</input>
        </div>
    </div>
</div>

<script>
    function hideIframe(){
        document.getElementById('iframe-container').classList.add('d-none')
    }

    function showIframe(iframe_src){
        document.getElementById('iframe').src = iframe_src
        document.getElementById('iframe-container').classList.remove('d-none')
    }

    function createChar(){
        name = document.getElementById('char-name').value.trim()
        char_class = document.getElementById('char-class').value
        char_race = document.getElementById('char-race').value
        char_type =  document.getElementById('char-type').value
        char_owner = document.getElementById('char-owner').value
        char_exp = document.getElementById('char-exp').value

        if(name == ''){
            window.location.replace(window.location.href + '/create/missing-name')
            return
        }

        url = window.location.href + `/create/${name}/${char_class}/${char_race}/${char_type}/${char_owner}/${char_exp}`
        window.location.replace(url)
    }

    function chooseClass(button){
        document.getElementById('char-class').value = button.dataset.className
        document.getElementById('char-class-dropdown-toggle').innerHTML = button.dataset.className
        document.getElementById('char-class-dropdown-menu').classList.add('d-none')

        for (const classButton of document.getElementsByName('class-choice')) {
            classButton.classList.remove('border-primary')
            classButton.classList.add('border-warning')
        }

        button.classList.remove('border-warning')
        button.classList.add('border-primary')
    }

    function chooseClassFromSelect(select){
        document.getElementById('char-class').value = select.value
    }

    function toggleClassDropdown(){
        document.getElementById('char-class-dropdown-menu').classList.toggle('d-none')
    }

</script>

{% endblock content %}
